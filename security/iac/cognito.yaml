AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Cognito User Pool for Bedrock AgentCore agent authorization

Parameters:
  pPoolName:
    Type: String
    Description: Name of the Cognito User Pool
  pDomain:
    Type: String
    Description: Cognito UserPool domain prefix (must be globally unique)
  pResourceServerIdentifier:
    Type: String
    Description: Resource server identifier (short name or URI)
  pScopes:
    Type: CommaDelimitedList
    Description: Comma-separated list of OAuth scope names
    Default: "invoke"
  pCallbackUrls:
    Type: CommaDelimitedList
    Description: Comma-separated list of allowed callback URLs
    Default: "https://localhost"
  pTagApplication:
    Type: String
    Description: Value for the loom:application tag
  pTagGroup:
    Type: String
    Description: Value for the loom:group tag
  pTagOwner:
    Type: String
    Description: Value for the loom:owner tag

Resources:
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Ref pPoolName
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
      UserPoolTags:
        "loom:application": !Ref pTagApplication
        "loom:group": !Ref pTagGroup
        "loom:owner": !Ref pTagOwner

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref pDomain
      UserPoolId: !Ref CognitoUserPool

  CognitoResourceServer:
    Type: AWS::Cognito::UserPoolResourceServer
    Properties:
      Identifier: !Ref pResourceServerIdentifier
      Name: !Sub "${pPoolName}-resource-server"
      UserPoolId: !Ref CognitoUserPool
      Scopes:
        - ScopeName: invoke
          ScopeDescription: Invoke agent through AgentCore
        - ScopeName: catalog:read
          ScopeDescription: Read catalog resources
        - ScopeName: catalog:write
          ScopeDescription: Write catalog resources
        - ScopeName: agent:read
          ScopeDescription: Read agents
        - ScopeName: agent:write
          ScopeDescription: Write agents
        - ScopeName: memory:read
          ScopeDescription: Read memory resources
        - ScopeName: memory:write
          ScopeDescription: Write memory resources
        - ScopeName: security:read
          ScopeDescription: Read security configurations
        - ScopeName: security:write
          ScopeDescription: Write security configurations
        - ScopeName: settings:read
          ScopeDescription: Read settings
        - ScopeName: settings:write
          ScopeDescription: Write settings
        - ScopeName: tagging:read
          ScopeDescription: View tag policies and profiles
        - ScopeName: tagging:write
          ScopeDescription: Manage tag policies and profiles
        - ScopeName: costs:read
          ScopeDescription: View cost data
        - ScopeName: costs:write
          ScopeDescription: Manage cost settings
        - ScopeName: mcp:read
          ScopeDescription: Read MCP servers
        - ScopeName: mcp:write
          ScopeDescription: Write MCP servers
        - ScopeName: a2a:read
          ScopeDescription: Read A2A agents
        - ScopeName: a2a:write
          ScopeDescription: Write A2A agents

  # Type Groups (defines UI view)
  TypeAdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: t-admin
      Description: Admin UI view
      UserPoolId: !Ref CognitoUserPool

  TypeUserGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: t-user
      Description: User UI view (restricted to Catalog, Agents, Memory, Costs)
      UserPoolId: !Ref CognitoUserPool

  # Admin Groups (t-admin users - single group only)
  GroupAdminsSuperGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: g-admins-super
      Description: Full read/write access to all resources
      UserPoolId: !Ref CognitoUserPool

  GroupAdminsDemoGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: g-admins-demo
      Description: Read-only across all pages; read/write for demo group resources
      UserPoolId: !Ref CognitoUserPool

  GroupAdminsSecurityGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: g-admins-security
      Description: Manage security configurations
      UserPoolId: !Ref CognitoUserPool

  GroupAdminsMemoryGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: g-admins-memory
      Description: Manage memory resources
      UserPoolId: !Ref CognitoUserPool

  GroupAdminsMcpGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: g-admins-mcp
      Description: Manage MCP servers
      UserPoolId: !Ref CognitoUserPool

  GroupAdminsA2aGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: g-admins-a2a
      Description: Manage A2A agents
      UserPoolId: !Ref CognitoUserPool

  # User Groups (t-user users - can have multiple)
  GroupUsersDemoGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: g-users-demo
      Description: Access to demo group resources
      UserPoolId: !Ref CognitoUserPool

  GroupUsersTestGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: g-users-test
      Description: Access to test group resources
      UserPoolId: !Ref CognitoUserPool

  GroupUsersStrategicsGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: g-users-strategics
      Description: Access to strategics group resources
      UserPoolId: !Ref CognitoUserPool

  # Users
  AdminUser:
    Type: AWS::Cognito::UserPoolUser
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Username: admin
      UserAttributes:
        - Name: email
          Value: admin@heeki.cloud

  DemoAdminUser:
    Type: AWS::Cognito::UserPoolUser
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Username: demo-admin
      UserAttributes:
        - Name: email
          Value: demo-admin@heeki.cloud

  SecurityAdminUser:
    Type: AWS::Cognito::UserPoolUser
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Username: security-admin
      UserAttributes:
        - Name: email
          Value: security-admin@heeki.cloud

  IntegrationAdminUser:
    Type: AWS::Cognito::UserPoolUser
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Username: integration-admin
      UserAttributes:
        - Name: email
          Value: integration-admin@heeki.cloud

  DemoUserUser:
    Type: AWS::Cognito::UserPoolUser
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Username: demo-user
      UserAttributes:
        - Name: email
          Value: demo-user@heeki.cloud

  # User-to-group assignments
  # Admin user: t-admin + g-admins-super
  AdminToTypeAdmin:
    Type: AWS::Cognito::UserPoolUserToGroupAttachment
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Username: !Ref AdminUser
      GroupName: !Ref TypeAdminGroup

  AdminToGroupAdminsSuper:
    Type: AWS::Cognito::UserPoolUserToGroupAttachment
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Username: !Ref AdminUser
      GroupName: !Ref GroupAdminsSuperGroup

  # Demo-admin user: t-admin + g-admins-demo
  DemoAdminToTypeAdmin:
    Type: AWS::Cognito::UserPoolUserToGroupAttachment
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Username: !Ref DemoAdminUser
      GroupName: !Ref TypeAdminGroup

  DemoAdminToGroupAdminsDemo:
    Type: AWS::Cognito::UserPoolUserToGroupAttachment
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Username: !Ref DemoAdminUser
      GroupName: !Ref GroupAdminsDemoGroup

  # Security-admin user: t-admin + g-admins-security
  SecurityAdminToTypeAdmin:
    Type: AWS::Cognito::UserPoolUserToGroupAttachment
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Username: !Ref SecurityAdminUser
      GroupName: !Ref TypeAdminGroup

  SecurityAdminToGroupAdminsSecurity:
    Type: AWS::Cognito::UserPoolUserToGroupAttachment
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Username: !Ref SecurityAdminUser
      GroupName: !Ref GroupAdminsSecurityGroup

  # Integration-admin user: t-admin + g-admins-memory + g-admins-mcp + g-admins-a2a
  IntegrationAdminToTypeAdmin:
    Type: AWS::Cognito::UserPoolUserToGroupAttachment
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Username: !Ref IntegrationAdminUser
      GroupName: !Ref TypeAdminGroup

  IntegrationAdminToGroupAdminsMemory:
    Type: AWS::Cognito::UserPoolUserToGroupAttachment
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Username: !Ref IntegrationAdminUser
      GroupName: !Ref GroupAdminsMemoryGroup

  IntegrationAdminToGroupAdminsMcp:
    Type: AWS::Cognito::UserPoolUserToGroupAttachment
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Username: !Ref IntegrationAdminUser
      GroupName: !Ref GroupAdminsMcpGroup

  IntegrationAdminToGroupAdminsA2a:
    Type: AWS::Cognito::UserPoolUserToGroupAttachment
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Username: !Ref IntegrationAdminUser
      GroupName: !Ref GroupAdminsA2aGroup

  # Demo-user: t-user + g-users-demo
  DemoUserToTypeUser:
    Type: AWS::Cognito::UserPoolUserToGroupAttachment
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Username: !Ref DemoUserUser
      GroupName: !Ref TypeUserGroup

  DemoUserToGroupUsersDemo:
    Type: AWS::Cognito::UserPoolUserToGroupAttachment
    Properties:
      UserPoolId: !Ref CognitoUserPool
      Username: !Ref DemoUserUser
      GroupName: !Ref GroupUsersDemoGroup

  # Machine-to-machine client (client_credentials flow, access token only)
  M2MClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: CognitoResourceServer
    Properties:
      ClientName: !Sub "${pPoolName}-m2m-client"
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: true
      AllowedOAuthFlows:
        - client_credentials
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - !Sub "${pResourceServerIdentifier}/invoke"
      CallbackURLs: !Ref pCallbackUrls
      SupportedIdentityProviders:
        - COGNITO

  # User-facing client (authorization code flow, returns id + access + refresh tokens)
  UserClient:
    Type: AWS::Cognito::UserPoolClient
    DependsOn: CognitoResourceServer
    Properties:
      ClientName: !Sub "${pPoolName}-user-client"
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_ADMIN_USER_PASSWORD_AUTH
      AllowedOAuthFlows:
        - code
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - openid
        - email
        - profile
        - !Sub "${pResourceServerIdentifier}/invoke"
        - !Sub "${pResourceServerIdentifier}/catalog:read"
        - !Sub "${pResourceServerIdentifier}/catalog:write"
        - !Sub "${pResourceServerIdentifier}/agent:read"
        - !Sub "${pResourceServerIdentifier}/agent:write"
        - !Sub "${pResourceServerIdentifier}/memory:read"
        - !Sub "${pResourceServerIdentifier}/memory:write"
        - !Sub "${pResourceServerIdentifier}/security:read"
        - !Sub "${pResourceServerIdentifier}/security:write"
        - !Sub "${pResourceServerIdentifier}/settings:read"
        - !Sub "${pResourceServerIdentifier}/settings:write"
        - !Sub "${pResourceServerIdentifier}/tagging:read"
        - !Sub "${pResourceServerIdentifier}/tagging:write"
        - !Sub "${pResourceServerIdentifier}/costs:read"
        - !Sub "${pResourceServerIdentifier}/costs:write"
        - !Sub "${pResourceServerIdentifier}/mcp:read"
        - !Sub "${pResourceServerIdentifier}/mcp:write"
        - !Sub "${pResourceServerIdentifier}/a2a:read"
        - !Sub "${pResourceServerIdentifier}/a2a:write"
      CallbackURLs: !Ref pCallbackUrls
      SupportedIdentityProviders:
        - COGNITO

Outputs:
  oCognitoUserPoolId:
    Description: Cognito UserPool ID
    Value: !Ref CognitoUserPool
  oCognitoUserPoolArn:
    Description: Cognito UserPool ARN
    Value: !GetAtt CognitoUserPool.Arn
  oM2MClientId:
    Description: "Machine-to-machine client ID (client_credentials flow: access token only)"
    Value: !Ref M2MClient
  oUserClientId:
    Description: "User-facing client ID (authorization code flow: id + access + refresh tokens)"
    Value: !Ref UserClient
  oCognitoDomain:
    Description: Cognito UserPool domain
    Value: !Ref pDomain
  oCognitoDiscoveryUrl:
    Description: Cognito OIDC Discovery URL
    Value: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}/.well-known/openid-configuration"
  oCognitoIssuer:
    Description: Cognito Issuer URL
    Value: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}"
  oCognitoTokenUrl:
    Description: Cognito Token endpoint URL
    Value: !Sub "https://${pDomain}.auth.${AWS::Region}.amazoncognito.com/oauth2/token"
