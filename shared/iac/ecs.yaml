AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: ECS Fargate cluster for Loom (shared by frontend and backend services)

Parameters:
  pTagApplication:
    Type: String
    Description: Value for the loom:application tag
  pTagGroup:
    Type: String
    Description: Value for the loom:group tag
  pTagOwner:
    Type: String
    Description: Value for the loom:owner tag

Resources:
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${AWS::StackName}-cluster"
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 0
          Base: 1
        - CapacityProvider: FARGATE_SPOT
          Weight: 1
      Tags:
        - Key: loom:application
          Value: !Ref pTagApplication
        - Key: loom:group
          Value: !Ref pTagGroup
        - Key: loom:owner
          Value: !Ref pTagOwner

Outputs:
  oEcsClusterName:
    Description: ECS cluster name
    Value: !Ref EcsCluster
  oEcsClusterArn:
    Description: ECS cluster ARN
    Value: !GetAtt EcsCluster.Arn
